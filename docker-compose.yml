services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bitnp_ideas}
      POSTGRES_USER: ${POSTGRES_USER:-bitnp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bitnp_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bitnp} -d ${POSTGRES_DB:-bitnp_ideas}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://bitnp:bitnp_dev_password@postgres:5432/bitnp_ideas
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: /api/v1
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres-data:

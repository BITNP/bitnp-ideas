app:
  name: BITNP IDEAS
  version: 0.1.0
  openapi_url: /openapi.json
  docs_url: /docs

server:
  cors_origins:
    - http://localhost:5173
    - http://localhost:8080

database:
  url: postgres://bitnp_ideas:bitnp_ideas@postgres/bitnp_ideas

security:
  session_secret_key: bitnp-ideas-docker-session-secret
  oidc:
    enabled: false
    issuer_url: https://login.bitnp.net/auth/realms/master
    client_id: null
    client_secret: null

api_keys:
  timestamp_tolerance_seconds: 300
  allowed_entities:
    - idea

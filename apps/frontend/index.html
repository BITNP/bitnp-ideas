<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/assets/bitnp-logo-white-bg.svg" />
    <meta name="theme-color" content="#da751d" />
    <title>BITNP IDEAS</title>
    <style>
      #app-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #f5f5f5;
      }
      #app-loader::after {
        content: "";
        width: 48px;
        height: 48px;
        border: 4px solid #e0e0e0;
        border-top-color: #da751d;
        border-radius: 50%;
        animation: app-spin 0.8s linear infinite;
      }
      @keyframes app-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-loader"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
